<!DOCTYPE html>
<html>
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XTGNCVEKBV"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XTGNCVEKBV');

<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:1200px;height:630px;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#0a2540;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:64px 72px;
  position:relative;
}
.bg-circle{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,.04);
}
.bg-circle--1{width:600px;height:600px;right:-120px;top:-120px}
.bg-circle--2{width:380px;height:380px;right:80px;bottom:-100px}
.bg-circle--3{width:220px;height:220px;left:300px;top:-60px}
.left{position:relative;z-index:1;max-width:640px}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(230,57,70,.15);border:1px solid rgba(230,57,70,.4);
  color:#e63946;font-size:14px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;padding:8px 16px;border-radius:6px;margin-bottom:28px;
}
.badge::before{content:"★";font-size:12px}
h1{
  font-size:52px;font-weight:900;line-height:1.15;
  margin-bottom:24px;letter-spacing:-.02em;
}
h1 span{color:#e63946}
.desc{
  font-size:19px;color:rgba(255,255,255,.7);line-height:1.5;
  margin-bottom:36px;max-width:560px;
}
.pills{display:flex;gap:12px;flex-wrap:wrap}
.pill{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  padding:8px 18px;border-radius:50px;font-size:14px;font-weight:600;
  color:rgba(255,255,255,.85);
}
.right{position:relative;z-index:1;text-align:center}
.logo-box{
  width:220px;height:220px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  border-radius:32px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;margin-bottom:20px;
}
.star{font-size:80px;line-height:1;color:#e63946;filter:drop-shadow(0 0 20px rgba(230,57,70,.5))}
.brand-name{font-size:13px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.6);text-transform:uppercase;text-align:center;max-width:180px;line-height:1.4}
.domain{font-size:15px;color:rgba(255,255,255,.4);font-weight:500}
.divider{
  position:absolute;bottom:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,#e63946,#ff6b6b,#e63946);
}
</style>
</head>
<body>
<div class="bg-circle bg-circle--1"></div>
<div class="bg-circle bg-circle--2"></div>
<div class="bg-circle bg-circle--3"></div>

<div class="left">
  <div class="badge">Ayyıldız Yetkili Satıcısı</div>
  <h1>E-İmza ve KEP<br><span>81 İlde Hızlı</span><br>Teslimat</h1>
  <p class="desc">Bireysel, firma ve kurumsal e-imza çözümleri.<br>Aynı gün kargo, uzaktan kurulum, ücretsiz destek.</p>
  <div class="pills">
    <span class="pill">✍ E-İmza</span>
    <span class="pill">✉ KEP</span>
    <span class="pill">⏱ Zaman Damgası</span>
    <span class="pill">⚙ E-Mühür</span>
  </div>
</div>

<div class="right">
  <div class="logo-box">
    <div class="star">★</div>
    <div class="brand-name">UMAY TÜM<br>BİLİŞİM</div>
  </div>
  <div class="domain">e-imzasatinal.com.tr</div>
</div>

<div class="divider"></div>
</body>
</html>
